<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nex-Architect</title>
  <meta name="description" content="Software products and developer tools by Nex-Architect.">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      line-height: 1.6;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    h1,
    h2 {
      line-height: 1.2;
    }

    .card {
      margin-top: 24px;
      padding: 20px;
      border: 1px solid #334155;
      border-radius: 14px;
      background: #111827;
    }

    a.button {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 16px;
      border-radius: 10px;
      text-decoration: none;
      background: #60a5fa;
      color: #0b1020;
      font-weight: bold;
    }

    p {
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Nex-Architect</h1>
    <p>Developer tools and local-first software products.</p>

    <div class="card">
      <h2>DustVault</h2>
      <p>
        A local-first developer CLI for turning codebases into AI-friendly bundles
        and inspecting project snapshots offline.
      </p>
      <a class="button" href="/dustvault/">View DustVault</a>
    </div>
  </div>
</body>
</html>
